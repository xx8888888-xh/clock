name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-missing \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libunwind-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer cython

    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Check project files
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo "=== Checking main.py ==="
        head -20 main.py
        echo "=== Checking icon.png ==="
        ls -la icon.png || echo "WARNING: icon.png not found!"
        echo "=== Checking buildozer.spec ==="
        head -30 buildozer.spec

    - name: Clean previous build
      run: |
        rm -rf bin/ .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/

    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug
      timeout-minutes: 90

    - name: Check build output
      if: always()
      run: |
        echo "=== Checking bin directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
        echo "=== Checking .buildozer directory ==="
        ls -la .buildozer/ 2>/dev/null || echo ".buildozer/ directory not found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: petalarm-apk
        path: bin/*.apk
        if-no-files-found: error

    - name: Create Release
      if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
        tag_name: v3.0.${{ github.run_number }}
        name: Pet Alarm Clock v3.0.${{ github.run_number }}
        body: |
          ## Pet Alarm Clock Android APK

          ### Version Info
          - Version: v3.0.${{ github.run_number }}
          - Fixes: All known bugs
          - Features: Floating pet, alarm, countdown

          ### Installation
          1. Download APK file
          2. Install on Android device
          3. Grant overlay permission

          ### Features
          - Floating pet
          - Smart alarm
          - Countdown timer
          - Snooze mode
          - Vibration alert
          - Sound alert
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
