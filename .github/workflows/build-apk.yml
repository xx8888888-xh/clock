name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          autoconf \
          automake \
          libtool \
          pkg-config

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer

    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug
      timeout-minutes: 60

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: petalarm-apk
        path: bin/*.apk

    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v3.0.${{ github.run_number }}
        name: Pet Alarm Clock v3.0.${{ github.run_number }}
        body: |
          ## Pet Alarm Clock Android APK

          ### Version Info
          - Version: v3.0.${{ github.run_number }}
          - Fixes: All known bugs
          - Features: Floating pet, alarm, countdown

          ### Installation
          1. Download APK file
          2. Install on Android device
          3. Grant overlay permission

          ### Features
          - Floating pet
          - Smart alarm
          - Countdown timer
          - Snooze mode
          - Vibration alert
          - Sound alert
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
