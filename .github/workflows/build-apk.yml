name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.cache/pip
          __pycache__
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-missing \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libunwind-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer cython

    - name: Setup Android SDK licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" > ~/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license

    - name: Check project files
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo "=== Checking main.py ==="
        head -20 main.py
        echo "=== Checking icon.png ==="
        ls -la icon.png || echo "WARNING: icon.png not found!"
        echo "=== Checking buildozer.spec ==="
        head -30 buildozer.spec

    - name: Clean previous build
      run: |
        rm -rf bin/
        rm -rf .buildozer/

    - name: Pre-install Android SDK
      run: |
        mkdir -p ~/.buildozer/android/platform/
        cd ~/.buildozer/android/platform/
        # Download command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        # Create symlink for Buildozer compatibility
        mkdir -p android-sdk/tools/bin
        ln -sf ../../cmdline-tools/latest/bin/sdkmanager android-sdk/tools/bin/sdkmanager
        # Set Android SDK root environment variable
        export ANDROID_SDK_ROOT=$(pwd)/android-sdk
        # Update sdkmanager package repository
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_SDK_ROOT} --update
        # Accept licenses and install platform-tools
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_SDK_ROOT} --licenses
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_SDK_ROOT} "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        # Download and install NDK
        wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip -q android-ndk-r25b-linux.zip
        # NDK 解压后已经是正确的目录名，不需要移动
        # 验证 NDK 安装
        ls -la

    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        # 让 Buildozer 自动处理 SDK 和 NDK 路径
        # 移除可能导致冲突的环境变量
        # 详细日志输出，保存到本地 log 文件
        # 设置 Cython 环境变量，确保正确编译
        export CYTHON_FORCE_NO_DOCSTRINGS=1
        buildozer android debug > build.log 2>&1 || true
        # 显示最后 500 行日志，便于调试
        tail -500 build.log
        # 检查构建是否成功
        if [ -f "bin/*.apk" ]; then
          echo "Build successful!"
          exit 0
        else
          echo "Build failed!"
          # 上传错误日志到云端
          echo "Uploading error log..."
          cat build.log
          exit 1
        fi
      timeout-minutes: 90

    - name: Check build output
      if: always()
      run: |
        echo "=== Checking bin directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
        echo "=== Checking .buildozer directory ==="
        ls -la .buildozer/ 2>/dev/null || echo ".buildozer/ directory not found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: petalarm-apk
        path: bin/*.apk
        if-no-files-found: error

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: warn

    - name: Create Release
      if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
        tag_name: v3.0.${{ github.run_number }}
        name: Pet Alarm Clock v3.0.${{ github.run_number }}
        body: |
          ## Pet Alarm Clock Android APK

          ### Version Info
          - Version: v3.0.${{ github.run_number }}
          - Fixes: All known bugs
          - Features: Floating pet, alarm, countdown

          ### Installation
          1. Download APK file
          2. Install on Android device
          3. Grant overlay permission

          ### Features
          - Floating pet
          - Smart alarm
          - Countdown timer
          - Snooze mode
          - Vibration alert
          - Sound alert
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
